name: Main Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"

  docker:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: deveshpatil562/myflaskapp
      tag: latest
      environment: production   # explicitly passed
    secrets: inherit

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production
    steps:
      - run: echo "Deploying image ${{ needs.docker.outputs.image_url }} to production"
