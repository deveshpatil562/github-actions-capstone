name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: production
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ inputs.image_name }}:latest \
                       -t ${{ inputs.image_name }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ inputs.image_name }}:latest
          docker push ${{ inputs.image_name }}:${{ github.sha }}

      - name: Set output
        run: echo "image_url=${{ inputs.image_name }}:${{ github.sha }}" >> $GITHUB_OUTPUT
